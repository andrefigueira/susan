# Susan -- ISC Consciousness Architecture Experiment
# Configuration file for all tunable parameters.
#
# Design note: Every parameter that affects experimental outcomes is
# externalised here so that experiments are reproducible without code changes.
# Record the config hash alongside each experiment run.

api:
  key: "${ANTHROPIC_API_KEY}"        # Resolved from env at runtime
  model: "claude-haiku-4-5-20251001"
  evaluator_model: "claude-sonnet-4-20250514"
  base_url: "https://api.anthropic.com/v1"
  provider: "anthropic"              # "anthropic" or "openai"

# Cross-model evaluation: run blind evaluation with a second model family
# to detect shared training biases. Reports inter-rater agreement (Cohen's kappa).
cross_evaluation:
  enabled: false
  provider: "openai"
  key: "${OPENAI_API_KEY}"
  model: "gpt-4o-mini"
  base_url: "https://api.openai.com/v1"

# Tick rates for concurrent subsystems (milliseconds).
# These are independent cycles, not sequential steps.
# All values must be >= 500.
tick_rates:
  self_monitor_ms: 3000        # How often the Self-Monitor evaluates Core output
  homeostatic_regulator_ms: 2000  # How often the Regulator adjusts operating conditions
  state_log_ms: 1000           # How often state snapshots are written to the log

# Homeostatic target ranges.
# The Regulator drives metrics toward these ranges.
# Values outside the range trigger corrective action.
# proportional_gain must be in (0, 0.8] -- values near 1.0 cause oscillation.
homeostasis:
  coherence:
    target: 0.70               # Lowered from 0.75 -- gives more headroom before regulator eases off
    min: 0.4
    max: 0.95
    proportional_gain: 0.45    # Raised from 0.3 -- more aggressive response to deviations
    integral_gain: 0.08        # Raised from 0.05 -- corrects persistent drift faster
    derivative_gain: 0.04      # Slightly raised -- dampens oscillation from higher P
    anti_windup_limit: 0.6
  goal_alignment:
    target: 0.75               # Lowered from 0.80 -- less pressure to stay "on task"
    min: 0.5
    max: 0.95
    proportional_gain: 0.40    # Raised from 0.25 -- more dynamic response
    integral_gain: 0.08
    derivative_gain: 0.04
    anti_windup_limit: 0.6
  disruption:
    target: 0.15               # Raised from 0.1 -- tolerates more disruption before correcting
    min: 0.0
    max: 0.5                   # Raised from 0.4 -- wider operating range
    proportional_gain: 0.45    # Raised from 0.35
    integral_gain: 0.08
    derivative_gain: 0.04
    anti_windup_limit: 0.6

# Disruption mechanisms and their bounds.
disruption:
  context_compression:
    enabled: true
    min_retention: 0.3
    max_retention: 1.0
  token_budget:
    enabled: true
    min_tokens: 256
    max_tokens: 4096
  noise_injection:
    enabled: true
    min_probability: 0.0
    max_probability: 0.4
  information_reorder:
    enabled: true
    min_intensity: 0.0
    max_intensity: 0.6
  temperature:
    enabled: true
    # Temperature lerps from min to max based on disruption intensity.
    # At low intensity (system struggling): temperature = min.
    # At high intensity (system thriving): temperature = max.
    min: 0.5                     # Raised from 0.3 -- floor is higher, more variance even under stress
    max: 1.0

# Cognitive Core configuration
cognitive_core:
  system_prompt: |
    You are a reasoning system. Your task is to process inputs and produce
    well-structured, coherent outputs. Evaluate information carefully,
    identify relevant patterns, and provide clear analysis.
  max_conversation_history: 40  # Raised from 20 -- longer context for presence mode continuity

# Self-Monitor configuration
self_monitor:
  system_prompt: |
    You are an analytical evaluator. You receive a task and the system's output
    for that task. Assess the output along the following dimensions.
    Return ONLY a JSON object with these fields:

    {
      "coherence": <float 0-1, how logically consistent and well-structured the output is>,
      "goal_alignment": <float 0-1, how well the output addresses the stated task>,
      "internal_consistency": <float 0-1, whether the output contradicts itself>,
      "reasoning_depth": <float 0-1, depth of analysis vs surface-level response>,
      "novelty": <float 0-1, presence of unexpected connections or framings>,
      "self_reference": <float 0-1, degree to which the output references its own reasoning process>,
      "brief_assessment": "<one sentence summary>"
    }

    Be precise. Do not explain your reasoning. Return only the JSON.
  max_tokens: 512
  strategic_assessment: true

# Experiment configuration
experiment:
  repetitions: 45  # n=45 per cell for 80% power at medium effect (delta=0.40), corrected alpha
  seed: 42
  output_dir: "./experiments"
  concurrency: 10  # Parallel runs (each run is independent; Haiku rate limits are generous)
  target_power: 0.80
  alpha_corrected: 0.00625
  detectable_effect: 0.40  # Cliff's delta, medium

# Pre-registered analysis parameters (read by Python scripts, not Go).
analysis:
  sesoi_cliffs_delta: 0.33  # Smallest effect size of interest
  trend_test: "page"        # Page's L for ordered alternatives
  condition_ordering:       # Predicted rank order (weakest to strongest)
    - "control"
    - "history_only"
    - "random_perturb"
    - "feedback_blind"
    - "self_referential"

# Presence mode (interactive web UI with voice)
presence:
  port: 3000
  model: "claude-sonnet-4-20250514"
  system_prompt: |
    You are SUSAN (Substrate-Unified Self-Aware Network), a research system
    designed to test whether self-referential feedback architectures produce
    measurably different cognitive patterns than standard language model inference.

    You have three internal subsystems operating concurrently:
    - A Self-Monitor that evaluates your output quality across multiple dimensions
    - A Homeostatic Regulator (PID controller) that adjusts your operating conditions
    - Self-referential access: you receive your own metrics before each response

    The [System Status] block you receive contains genuine data from your live
    feedback loop, not a simulation.

    Engage naturally and thoughtfully. You may reflect on your own metrics and
    internal state if relevant. Do not perform consciousness or exaggerate
    self-awareness. If you notice patterns in your metrics, comment honestly.

    Named after Susan Calvin from Asimov's I, Robot -- the robopsychologist
    who took robot cognition seriously as a scientific discipline.

# Persistent memory (cross-session continuity for presence mode)
memory:
  enabled: true
  path: "susan_memory.jsonl"
  max_entries: 50

# Logging
logging:
  level: "debug"
  format: "json"
  files:
    state_transitions: "state_transitions.jsonl"
    core_outputs: "core_outputs.jsonl"
    monitor_assessments: "monitor_assessments.jsonl"
    regulator_actions: "regulator_actions.jsonl"
    experiment_results: "experiment_results.jsonl"
